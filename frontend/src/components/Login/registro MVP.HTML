<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Registro MVP - Registration Page</title>
<!-- Tailwind CSS v3 CDN with forms and container-queries plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Configuration -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              background: '#0A0A0F',
              card: '#12121A',
              input: '#1A1A26',
              accent: '#EF9918',
              muted: '#707783',
              text: '#6B7280'
            }
          },
          borderRadius: {
            '24': '24px',
            '16': '16px',
          }
        }
      }
    }
  </script>
<!-- END: Custom Configuration -->
<!-- BEGIN: Custom Typography and Shadows -->
<style data-purpose="custom-styles">
    body {
      background-color: #0A0A0F;
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .card-shadow {
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(192, 199, 212, 0.2);
    }

    .button-glow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .form-input-focus:focus {
      outline: none;
      border-color: rgba(239, 153, 24, 0.5);
      ring: 1px rgba(239, 153, 24, 0.5);
    }

    /* Style for the custom checkbox */
    .custom-checkbox:checked {
      background-color: #EF9918;
      border-color: #EF9918;
    }
  </style>
<!-- END: Custom Typography and Shadows -->
</head>
<body class="min-h-screen flex items-start justify-center pt-8 px-4 pb-4">
<!-- BEGIN: MainContent -->
<main class="w-full max-w-[580px] max-h-[600px] bg-brand-card rounded-24 p-8 md:p-12 card-shadow relative" data-purpose="registration-card">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-10">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">
        Crear cuenta en CommerCity
      </h1>

</header>
<!-- END: HeaderSection -->
<!-- BEGIN: RegistrationForm -->
<form action="#" class="space-y-4" method="POST">
<!-- Name Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-brand-text opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-brand-input border-brand-input border-opacity-30 rounded-16 py-3 pl-12 pr-4 text-white placeholder-brand-text placeholder-opacity-50 transition-all form-input-focus" name="full-name" placeholder="Nombre completo" required="" type="text">
</div>
<!-- Email Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-brand-text opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-brand-input border-brand-input border-opacity-30 rounded-16 py-3 pl-12 pr-4 text-white placeholder-brand-text placeholder-opacity-50 transition-all form-input-focus" name="email" placeholder="Correo electrónico" required="" type="email">
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-brand-text opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full bg-brand-input border-brand-input border-opacity-30 rounded-16 py-3 pl-12 pr-12 text-white placeholder-brand-text placeholder-opacity-50 transition-all form-input-focus" name="password" placeholder="Contraseña" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-brand-text opacity-60 hover:text-brand-accent" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-center space-x-3 pt-2">
<div class="flex items-center h-5">
<input class="custom-checkbox h-5 w-5 rounded-lg bg-brand-input border-brand-muted border-opacity-30 text-brand-accent focus:ring-brand-accent transition-all cursor-pointer" id="terms" name="terms" required="" type="checkbox">
</div>
<label class="text-sm text-brand-text leading-tight" for="terms">
          Acepto los <span class="text-brand-accent font-medium hover:underline cursor-pointer">términos y condiciones</span> de privacidad
        </label>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full h-[68px] bg-brand-accent rounded-16 text-brand-card font-bold text-lg uppercase tracking-wider transition-all transform hover:scale-[1.01] active:scale-[0.99] button-glow flex items-center justify-center" type="submit">
          Registrarse
        </button>
</div>
</form>
<!-- END: RegistrationForm -->
<!-- BEGIN: FooterLinks -->
<footer class="mt-8 pt-6 border-t border-brand-muted border-opacity-10 text-center">
<p class="text-brand-text text-sm">
        ¿Ya tienes cuenta? 
        <a class="text-brand-accent font-semibold hover:underline ml-1" href="#">Inicia sesión</a>
</p>
</footer>
<!-- END: FooterLinks -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNav (Simulated Footer Background) -->
<div class="fixed bottom-0 left-0 w-full h-[50px] bg-brand-card border-t border-brand-muted border-opacity-5"><div class="h-full flex items-center justify-center px-4">
  <p class="text-brand-text opacity-60 text-sm text-center">
    Copyright © 2024 Registro MVP. Todos los derechos reservados. <span class="hover:text-brand-accent cursor-pointer transition-colors">Política de privacidad</span>
  </p>
</div></div>
<!-- END: BottomNav -->


</body></html>
